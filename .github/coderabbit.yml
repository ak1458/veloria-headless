# CodeRabbit Configuration
# For more info: https://docs.coderabbit.ai/configuration/reference

reviews:
  profile: "chill"
  request_review_command: "review"
  high_level_summary: true
  file_diff_summary: true
  auto_review:
    enabled: true
    ignore_paths:
      - "node_modules/**"
      - ".next/**"
      - "public/**"
      - "*.min.js"
      - "package-lock.json"
  path_filters:
    - "src/**"

chat:
  enabled: true
